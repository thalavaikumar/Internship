<!DOCTYPE html>
<html>
<head>
    <title>Random Number Generator</title>
</head>
<body>
<button onclick="gen()">Generate</button>
    <p id="num"></p>
<script>
        function gen() {
            let n = Math.floor(Math.random() * 100);
            document.getElementById("num").innerHTML = n;
        }
    </script>
</body>
</html>
